<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #0b141a;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #e9edef;
            overflow: hidden;
        }

        /* Telefon Ekranı Simülasyonu */
        .phone-container {
            width: 100%;
            max-width: 420px;
            height: 100vh;
            background-color: #0b141a;
            /* WhatsApp Arka Plan Duvar Kağıdı Efekti */
            background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png');
            background-blend-mode: overlay;
            opacity: 0.95;
            display: flex;
            flex-direction: column;
            position: relative;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        /* WhatsApp Üst Bar (Header) */
        .whatsapp-header {
            background-color: #202c33;
            padding: 10px 16px;
            display: flex;
            align-items: center;
            height: 60px;
            border-bottom: 1px solid #2f3b43;
            z-index: 10;
        }

        .back-icon {
            margin-right: 8px;
            color: #aebac1;
            font-size: 20px;
            cursor: pointer;
        }

        .avatar {
            width: 40px;
            height: 40px;
            background-color: #6a7f8c;
            border-radius: 50%;
            margin-right: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            color: #fff;
            font-size: 18px;
        }

        .user-info {
            flex: 1;
        }

        .user-name {
            font-size: 16px;
            font-weight: 600;
            color: #e9edef;
        }

        .user-status {
            font-size: 12px;
            color: #8696a0;
            margin-top: 2px;
            height: 15px;
        }

        /* Sohbet Alanı */
        .chat-container {
            flex: 1;
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            overflow-y: auto;
        }

        /* WhatsApp Mesaj Balonu (Giden Mesaj Taslağı Tarzı) */
        .message-bubble {
            background-color: #005c4b;
            color: #e9edef;
            padding: 8px 12px;
            border-radius: 8px;
            max-width: 85%;
            align-self: flex-end;
            font-size: 15px;
            line-height: 1.4;
            position: relative;
            box-shadow: 0 1px 0.5px rgba(0,0,0,0.13);
            white-space: pre-wrap;
            word-break: break-word;
            margin-top: 10px;
            display: none; /* İlk başta gizli, yazma bitince görünecek */
        }

        /* Alt Yazma Alanı (Input Bar) */
        .input-container {
            background-color: #202c33;
            padding: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
            z-index: 10;
        }

        .input-bar {
            background-color: #2a3942;
            flex: 1;
            border-radius: 8px;
            padding: 10px 12px;
            display: flex;
            align-items: center;
            min-height: 40px;
        }

        .typewriter-input {
            font-size: 15px;
            color: #e9edef;
            flex: 1;
            white-space: pre-wrap;
            word-break: break-word;
            line-height: 1.4;
        }

        /* Yanıp Sönen Mavi/Açık Renkli WhatsApp İmleci */
        .cursor {
            display: inline-block;
            width: 2px;
            height: 17px;
            background-color: #00a884;
            margin-left: 2px;
            animation: blink 0.8s infinite;
            vertical-align: middle;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        .mic-icon {
            color: #8696a0;
            width: 40px;
            height: 40px;
            background-color: #2a3942;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 18px;
        }
    </style>
</head>
<body>

<div class="phone-container">
    <!-- Üst Bar -->
    <div class="whatsapp-header">
        <span class="back-icon">←</span>
        <div class="avatar">D</div>
        <div class="user-info">
            <div class="user-name">derinim</div>
            <div class="user-status" id="status">çevrimiçi</div>
        </div>
    </div>

    <!-- Sohbet Alanı -->
    <div class="chat-container">
        <!-- Gönderilen mesajlar bittikten sonra buraya düşebilir (opsiyonel) -->
        <div class="message-bubble" id="sent-message"></div>
    </div>

    <!-- Alt Input/Yazma Alanı -->
    <div class="input-container">
        <div class="input-bar">
            <div class="typewriter-input" id="input-text"></div><span class="cursor" id="cursor"></span>
        </div>
        <div class="mic-icon" id="action-btn">🎤</div>
    </div>
</div>

<script>
    // Yazılıp silinecek olan o derin cümlelerin sırasıyla listesi
    const "derinim" = "derinim";
    const steps = [
        { text: "beni üzdüğün gün sana sarılıp ağlamıştım hatırlıyor musun?", action: "typeAndClear" },
        { text: "aktif olmanı beklediğim dakikalarda yarım saat bekledim sonra çıktım gezdim ama seni sürekli saniyelerle kaçırdım kafamı yatağa vurasım geliyor sanki kapındayım da kafamı çevirdiğim an evden çıkıyorsun ve seni göremiyorum sana o kadar çok yazmak istiyorum ki ama yazamıyorum o yazıyı yazdığım günün ertesi sabahı düşünmeye başladım iki gündür doğru düzenli uyuyamıyorum aklımda sen olunca hep böyle oluyor yazamıyorum çünkü reddedeceksin gibi hissediyorum sana yazıp reddedilmek istemiyorum galiba senin kapında bekleyip kafamı çevirdiğimde seni görememeyi sana yazıp istemiyorum cevabını almaya tercih ederim belki bir gün denk düşeriz diye düşünüyorum zaten uyuyamıyorum gidip gelip sana bakıyorum belki görürüm diye", action: "typeAndClear" },
        { text: "müsait olduğunda tekrar sarılabilir miyim sana? ", action: "typeAndKeep" } // En son cümle yazılı kalacak
    ];

    const inputTextContainer = document.getElementById("input-text");
    const statusText = document.getElementById("status");
    const actionBtn = document.getElementById("action-btn");
    const messageBubble = document.getElementById("sent-message");

    let stepIndex = 0;

    function runWhatsappSimulation() {
        if (stepIndex < steps.length) {
            let currentStep = steps[stepIndex];
            
            // Sen yazmaya başladığında yukarıda "yazıyor..." bilgisi çıkacak kanka
            statusText.innerText = "yazıyor...";
            statusText.style.color = "#00a884"; 

            typeText(currentStep.text, 0, () => {
                // Yazma bittiğinde yukarıdaki durum normale döner
                statusText.innerText = "çevrimiçi";
                statusText.style.color = "#8696a0";

                if (currentStep.action === "typeAndClear") {
                    // 2 saniye yazılı beklesin, sonra silmeye başlasın
                    setTimeout(() => {
                        statusText.innerText = "çevrimiçi";
                        deleteText(() => {
                            stepIndex++;
                            setTimeout(runWhatsappSimulation, 1000); // Diğer cümleye geçmeden önce 1 sn bekle
                        });
                    }, 2000);
                } else if (currentStep.action === "typeAndKeep") {
                    // En son cümle bitince sağ alttaki mikrofon simgesi yeşil gönder butonuna dönüşür
                    actionBtn.innerText = "🕊️";
                    actionBtn.style.color = "#00a884";
                    // İstersen son cümle bittikten sonra ekranda balon olarak kalmasını sağlayabiliriz.
                }
            });
        }
    }

    // Harf harf yazdırma fonksiyonu
    function typeText(text, charIndex, callback) {
        if (charIndex < text.length) {
            inputTextContainer.innerText += text.charAt(charIndex);
            // WhatsApp yazma hızını taklit etmek için hafif değişken hız
            let dynamicSpeed = 50 + Math.random() * 40; 
            setTimeout(() => typeText(text, charIndex + 1, callback), dynamicSpeed);
        } else {
            callback();
        }
    }

    // Harf harf silme fonksiyonu
    function deleteText(callback) {
        let text = inputTextContainer.innerText;
        if (text.length > 0) {
            inputTextContainer.innerText = text.substring(0, text.length - 1);
            setTimeout(() => deleteText(callback), 25); // Silme işlemi klavyede hızlıca basıp tutma gibi seri olur
        } else {
            callback();
        }
    }

    // Telefon açıldıktan 1.5 saniye sonra simülasyon başlasın
    window.onload = () => {
        setTimeout(runWhatsappSimulation, 1500);
    };
</script>

</body>
</html>
